<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboards | US Vale Verde</title>
  <meta
    name="description"
    content="Hub de acesso aos dashboards da unidade de serviço US Vale Verde."
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="OpenBlast">
        <img src="./assets/openblast-logo.png" alt="OpenBlast">
      </a>
      <span class="unit-label">US Vale Verde</span>
    </header>

    <main class="content">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Hub de acesso</p>
        <h1 id="page-title">Dashboards</h1>
        <p class="hero-subtitle">US Vale Verde</p>
      </section>

      <section class="tiles" aria-label="Dashboards publicados">
        <a
          class="tile"
          href="https://silvathiagoferreira.github.io/aplicacao-de-emulsao/"
          target="_blank"
          rel="noreferrer"
        >
          <div class="tile-top">
            <span class="tile-kicker">Dashboard 01</span>
            <span class="tile-state">Live</span>
          </div>
          <div class="tile-main">
            <h2>Aplicação de Emulsão</h2>
            <p class="tile-description">Acompanhamento operacional</p>
          </div>
          <div class="tile-bottom">
            <span class="tile-caption">Operação</span>
            <span class="tile-action">Acessar</span>
          </div>
        </a>
      </section>
    </main>
  </div>
</body>
</html>
