<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboards | US Vale Verde</title>
  <meta
    name="description"
    content="Hub de acesso aos dashboards da unidade de serviço US Vale Verde."
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="OpenBlast">
        <img src="./assets/openblast-logo.png" alt="OpenBlast">
      </a>

      <div class="topbar-meta">
        <span class="meta-label">US Vale Verde</span>
      </div>
    </header>

    <main class="content">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Hub de acesso</p>
        <h1 id="page-title">Dashboards</h1>
      </section>

      <section class="overview" aria-label="Resumo">
        <div class="overview-card">
          <span class="overview-value">01</span>
          <span class="overview-label">Dashboard publicado</span>
        </div>
        <div class="overview-card">
          <span class="overview-value">01</span>
          <span class="overview-label">Ambiente ativo</span>
        </div>
        <div class="overview-card overview-card--muted">
          <span class="overview-value">US</span>
          <span class="overview-label">Unidade de serviço</span>
        </div>
      </section>

      <section class="hub" aria-labelledby="hub-title">
        <div class="section-bar">
          <h2 id="hub-title">Acessos</h2>
          <span class="section-note">Atual</span>
        </div>

        <div class="dashboard-grid">
          <article class="dashboard-tile">
            <div class="tile-head">
              <span class="tile-status">Live</span>
              <span class="tile-type">Operação</span>
            </div>

            <div class="tile-body">
              <h3>Aplicação de Emulsão</h3>
              <p>Monitoramento operacional</p>
            </div>

            <a
              class="tile-link"
              href="https://silvathiagoferreira.github.io/aplicacao-de-emulsao/"
              target="_blank"
              rel="noreferrer"
            >
              Acessar
            </a>
          </article>

          <article class="dashboard-tile dashboard-tile--placeholder" aria-hidden="true">
            <div class="tile-head">
              <span class="tile-type">Próximo</span>
            </div>

            <div class="tile-body">
              <h3>Novo dashboard</h3>
              <p>Em publicação</p>
            </div>
          </article>

          <article class="dashboard-tile dashboard-tile--placeholder" aria-hidden="true">
            <div class="tile-head">
              <span class="tile-type">Próximo</span>
            </div>

            <div class="tile-body">
              <h3>Novo dashboard</h3>
              <p>Em publicação</p>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
